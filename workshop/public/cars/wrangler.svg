<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <!-- Jeep Wrangler Rubicon -->
  <defs>
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#999;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#666;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="windowGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#87CEEB;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#4682B4;stop-opacity:0.8" />
    </linearGradient>
  </defs>
  <ellipse cx="400" cy="350" rx="310" ry="18" fill="rgba(0,0,0,0.15)"/>
  <!-- Body - Boxy SUV -->
  <path class="car-body" d="M120,290 L120,200 C120,190 125,180 135,175 L180,160 L200,110 C210,90 230,80 260,78 L540,78 C570,80 590,90 600,110 L620,160 L680,175 C695,180 700,190 700,200 L700,290 C700,300 695,305 685,305 L625,305 L575,305 C570,305 565,300 565,295 L565,290 C565,255 540,228 505,228 C470,228 445,255 445,290 L445,295 C445,300 440,305 435,305 L290,305 C285,305 280,300 280,295 L280,290 C280,255 255,228 220,228 C185,228 160,255 160,290 L160,295 C160,300 155,305 150,305 L135,305 C125,305 120,298 120,290 Z" fill="url(#bodyGrad)" stroke="#555" stroke-width="1.5"/>
  <!-- Roof - flat top -->
  <rect x="195" y="72" width="415" height="10" rx="5" fill="#555" stroke="#444" stroke-width="1"/>
  <!-- Windows -->
  <path d="M210,105 L218,82 L390,80 L390,160 L210,160 Z" fill="url(#windowGrad)" stroke="#555" stroke-width="1"/>
  <path d="M400,80 L580,82 L595,105 L605,160 L400,160 Z" fill="url(#windowGrad)" stroke="#555" stroke-width="1"/>
  <!-- Window dividers -->
  <line x1="390" y1="80" x2="390" y2="160" stroke="#555" stroke-width="3"/>
  <line x1="300" y1="80" x2="300" y2="160" stroke="#555" stroke-width="2"/>
  <line x1="500" y1="81" x2="502" y2="160" stroke="#555" stroke-width="2"/>
  <!-- Headlights - round -->
  <circle cx="690" cy="195" r="18" fill="#FFE066" stroke="#555" stroke-width="1.5" opacity="0.9"/>
  <circle cx="690" cy="195" r="10" fill="#FFF8DC" opacity="0.8"/>
  <!-- Taillights -->
  <circle cx="128" cy="220" r="14" fill="#FF4444" stroke="#555" stroke-width="1" opacity="0.9"/>
  <circle cx="128" cy="220" r="7" fill="#FF6666" opacity="0.8"/>
  <!-- Grille -->
  <rect x="700" y="175" width="15" height="60" rx="3" fill="#333" stroke="#555" stroke-width="1"/>
  <line x1="703" y1="182" x2="703" y2="228" stroke="#555" stroke-width="1"/>
  <line x1="707" y1="182" x2="707" y2="228" stroke="#555" stroke-width="1"/>
  <line x1="711" y1="182" x2="711" y2="228" stroke="#555" stroke-width="1"/>
  <!-- Door handle -->
  <rect x="355" y="140" width="25" height="5" rx="2" fill="#888" stroke="#555" stroke-width="0.5"/>
  <!-- Side line -->
  <path d="M135,180 L680,180" stroke="#777" stroke-width="1" fill="none" opacity="0.5"/>
  <!-- Front bumper - chunky -->
  <path d="M700,240 L722,245 L722,295 L705,300 L700,295 Z" fill="#444" stroke="#555" stroke-width="1"/>
  <!-- Rear bumper -->
  <path d="M120,240 L105,245 L105,295 L122,300 L125,295 Z" fill="#444" stroke="#555" stroke-width="1"/>
  <!-- Fender flares -->
  <path d="M155,280 C155,245 180,220 220,220 C260,220 285,245 285,280" fill="none" stroke="#555" stroke-width="3"/>
  <path d="M440,280 C440,245 465,220 505,220 C545,220 570,245 570,280" fill="none" stroke="#555" stroke-width="3"/>
  <!-- Wheels - bigger for SUV -->
  <g class="wheel-rear">
    <circle cx="220" cy="295" r="48" fill="#222"/>
    <circle cx="220" cy="295" r="40" fill="#333" stroke="#444" stroke-width="2"/>
    <circle cx="220" cy="295" r="20" fill="#555"/>
    <circle cx="220" cy="295" r="10" fill="#777"/>
    <line x1="220" y1="255" x2="220" y2="272" stroke="#666" stroke-width="3"/>
    <line x1="220" y1="318" x2="220" y2="335" stroke="#666" stroke-width="3"/>
    <line x1="180" y1="295" x2="197" y2="295" stroke="#666" stroke-width="3"/>
    <line x1="243" y1="295" x2="260" y2="295" stroke="#666" stroke-width="3"/>
  </g>
  <g class="wheel-front">
    <circle cx="505" cy="295" r="48" fill="#222"/>
    <circle cx="505" cy="295" r="40" fill="#333" stroke="#444" stroke-width="2"/>
    <circle cx="505" cy="295" r="20" fill="#555"/>
    <circle cx="505" cy="295" r="10" fill="#777"/>
    <line x1="505" y1="255" x2="505" y2="272" stroke="#666" stroke-width="3"/>
    <line x1="505" y1="318" x2="505" y2="335" stroke="#666" stroke-width="3"/>
    <line x1="465" y1="295" x2="482" y2="295" stroke="#666" stroke-width="3"/>
    <line x1="528" y1="295" x2="545" y2="295" stroke="#666" stroke-width="3"/>
  </g>
  <!-- Side mirror -->
  <ellipse cx="625" cy="148" rx="12" ry="8" fill="#888" stroke="#555" stroke-width="1"/>
</svg>
