<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350">
  <!-- Ford Mustang GT - Sports Car Side View -->
  <defs>
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#999;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#666;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="windowGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#87CEEB;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#4682B4;stop-opacity:0.8" />
    </linearGradient>
  </defs>
  <!-- Shadow -->
  <ellipse cx="400" cy="310" rx="320" ry="15" fill="rgba(0,0,0,0.15)"/>
  <!-- Body -->
  <path class="car-body" d="M120,250 L120,220 C120,210 130,200 140,195 L220,175 C240,170 260,140 300,125 L380,105 C400,100 460,98 500,100 L560,105 C580,108 600,120 610,135 L640,170 C660,175 680,185 700,195 L710,200 C720,205 720,220 720,230 L720,250 C720,265 710,270 700,270 L620,270 L560,270 C555,270 550,265 550,260 L550,255 C550,220 525,195 490,195 C455,195 430,220 430,255 L430,260 C430,265 425,270 420,270 L280,270 C275,270 270,265 270,260 L270,255 C270,220 245,195 210,195 C175,195 150,220 150,255 L150,260 C150,265 145,270 140,270 L130,270 C120,270 120,260 120,250 Z" fill="url(#bodyGrad)" stroke="#555" stroke-width="1.5"/>
  <!-- Roof & Windows -->
  <path d="M285,175 L320,125 C330,112 350,105 380,105 L500,100 C520,100 540,108 555,118 L590,150 C595,158 590,175 580,175 Z" fill="url(#windowGrad)" stroke="#555" stroke-width="1"/>
  <!-- Window divider -->
  <line x1="460" y1="102" x2="455" y2="175" stroke="#555" stroke-width="2"/>
  <!-- Headlight -->
  <path d="M700,195 L720,200 L720,225 L700,230 Z" fill="#FFE066" stroke="#555" stroke-width="1" opacity="0.9"/>
  <ellipse cx="712" cy="212" rx="6" ry="12" fill="#FFF8DC" opacity="0.8"/>
  <!-- Taillight -->
  <path d="M120,210 L130,205 L130,240 L120,240 Z" fill="#FF4444" stroke="#555" stroke-width="1" opacity="0.9"/>
  <!-- Door handle -->
  <rect x="350" y="155" width="30" height="5" rx="2" fill="#888" stroke="#555" stroke-width="0.5"/>
  <!-- Side line -->
  <path d="M140,200 L700,200" stroke="#777" stroke-width="1" fill="none" opacity="0.5"/>
  <!-- Front bumper -->
  <path d="M700,230 L725,235 L725,260 L710,265 L700,260 Z" fill="#444" stroke="#555" stroke-width="1"/>
  <!-- Rear bumper -->
  <path d="M120,230 L110,235 L110,260 L125,265 L130,260 Z" fill="#444" stroke="#555" stroke-width="1"/>
  <!-- Wheels -->
  <g class="wheel-rear">
    <circle cx="210" cy="260" r="42" fill="#222"/>
    <circle cx="210" cy="260" r="35" fill="#333" stroke="#444" stroke-width="2"/>
    <circle cx="210" cy="260" r="18" fill="#555"/>
    <circle cx="210" cy="260" r="8" fill="#777"/>
    <!-- Spokes -->
    <line x1="210" y1="225" x2="210" y2="240" stroke="#666" stroke-width="3"/>
    <line x1="210" y1="280" x2="210" y2="295" stroke="#666" stroke-width="3"/>
    <line x1="175" y1="260" x2="190" y2="260" stroke="#666" stroke-width="3"/>
    <line x1="230" y1="260" x2="245" y2="260" stroke="#666" stroke-width="3"/>
    <line x1="185" y1="235" x2="196" y2="246" stroke="#666" stroke-width="3"/>
    <line x1="224" y1="274" x2="235" y2="285" stroke="#666" stroke-width="3"/>
    <line x1="185" y1="285" x2="196" y2="274" stroke="#666" stroke-width="3"/>
    <line x1="224" y1="246" x2="235" y2="235" stroke="#666" stroke-width="3"/>
  </g>
  <g class="wheel-front">
    <circle cx="490" cy="260" r="42" fill="#222"/>
    <circle cx="490" cy="260" r="35" fill="#333" stroke="#444" stroke-width="2"/>
    <circle cx="490" cy="260" r="18" fill="#555"/>
    <circle cx="490" cy="260" r="8" fill="#777"/>
    <line x1="490" y1="225" x2="490" y2="240" stroke="#666" stroke-width="3"/>
    <line x1="490" y1="280" x2="490" y2="295" stroke="#666" stroke-width="3"/>
    <line x1="455" y1="260" x2="470" y2="260" stroke="#666" stroke-width="3"/>
    <line x1="510" y1="260" x2="525" y2="260" stroke="#666" stroke-width="3"/>
    <line x1="465" y1="235" x2="476" y2="246" stroke="#666" stroke-width="3"/>
    <line x1="504" y1="274" x2="515" y2="285" stroke="#666" stroke-width="3"/>
    <line x1="465" y1="285" x2="476" y2="274" stroke="#666" stroke-width="3"/>
    <line x1="504" y1="246" x2="515" y2="235" stroke="#666" stroke-width="3"/>
  </g>
  <!-- Side mirror -->
  <ellipse cx="598" cy="165" rx="12" ry="8" fill="#888" stroke="#555" stroke-width="1"/>
  <!-- Air intake -->
  <rect x="680" y="210" width="15" height="20" rx="2" fill="#333"/>
</svg>
